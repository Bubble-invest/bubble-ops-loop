# Dry-run fixture — generated by department-onboarding-guide (Step 6).
# Notion v5 lines 925-946. A fake queue item + a fake decision used to
# exercise the 4-layer round-trip without touching real APIs.
fake_queue_item:
  id: {{ fake_queue_item.id }}
  kind: {{ fake_queue_item.kind }}
  source_layer: {{ fake_queue_item.source_layer }}
  target_layer: {{ fake_queue_item.target_layer }}
  priority: {{ fake_queue_item.priority }}
  created_at: "{{ fake_queue_item.created_at }}"
  payload:
{% for k, v in fake_queue_item.payload.items() %}
    {{ k }}: {% if v is string %}"{{ v }}"{% else %}{{ v }}{% endif %}

{% endfor %}

fake_decision:
  approved: true
  approver: operator-dryrun
  note: "Synthetic decision for dry-run round-trip. No real action taken."
