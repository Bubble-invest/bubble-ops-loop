# POSITIVE CASE — must be ACCEPTED by dept.schema.yaml
# This is a minimal valid management dept.yaml that includes the full
# visibility block with read_outputs, read_paths, and all four boolean flags.
# Canonical reference: Notion §"Hiérarchie & visibilité cross-dept" + §"Scope
# dept.yaml pour un département management".
# Source of read_paths values: management-policy.template.yaml + NESTED-DEPTS-AUDIT.

department:
  slug: tony
  level: management
  mandate: "Aggregator across ops depts; produces priority directives; arbitrates cross-dept conflicts."

layers:
  subscribed: [1, 4]   # management: lightweight Layer 1 sweep + weekly Layer 4

recurring_missions: []   # management depts legitimately have zero recurring missions

skills:
  layer_1:
    - cross-dept-aggregator
  layer_4:
    - directive-quality-auditor

tools:
  - github-api
  - telegram-reporter

gate_policies:
  priority_directive:
    current_mode: manual_required
    eligible_future_modes:
      - auto_if_policy_passed
    authorization_band: tony_low_risk_directive_band
    kpi_guardrail_set: tony_directive_quality_kpis

hierarchy:
  level: management
  parent: principal
  children:
    - ben
    - maya
    - miranda
    - eliot
  visibility:
    read_outputs:
      - ben
      - maya
      - miranda
      - eliot
    read_paths:
      - outputs/*/4/risk-kpis.yaml
      - outputs/*/4/risk-brief.md
      - outputs/*/management-export.yaml
      - queues/gates/**
      - queues/improvements/**
    read_risk_kpis: true
    read_risk_briefs: true
    read_raw_artifacts: false   # Tony NEVER reads raw artifacts (Notion §1.1)
    read_secrets: false         # hardcoded const: false in schema
  directive_policy:
    can_open_priority_prs: true
    target_queue: queues/management/
    requires_human_gate_for:
      - mandate_change
      - capital_allocation
      - live_execution

optional_domain_ledger: null
