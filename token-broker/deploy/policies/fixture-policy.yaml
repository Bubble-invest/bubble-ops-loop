# Reference policy YAML for bubble-ops-fixture
# Shape per Notion v4 §"Ops department standard" (lines 624-644).

github_access:
  actor: ops-loop-fixture
  own_repo: bubble-ops-fixture

  read:
    - bubble-ops-fixture
